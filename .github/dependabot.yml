version: 2
updates:
  # JavaScript/TypeScript app dependencies
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Group only minor/patch bumps so the routine PR stays green and mergeable.
      # Major bumps arrive as individual PRs to review and migrate deliberately.
      npm:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  # GitHub Actions used by the CI workflow
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      # Same policy for Actions: group minor/patch, surface majors individually.
      github-actions:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
